<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Perfil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#6366f1', 'primary-dark': '#4f46e5' },
          fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <!-- Mobile Header -->
  <div class="lg:hidden fixed top-0 left-0 right-0 bg-white border-b border-gray-200 z-30 px-4 py-3 flex items-center justify-between">
    <h1 class="text-lg font-heading font-bold text-gray-800">Admin</h1>
    <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
      <i data-lucide="menu" class="w-5 h-5 text-gray-600"></i>
    </button>
  </div>

  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30 lg:hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-200">
    <div class="p-6 border-b border-gray-100">
      <h1 class="text-xl font-heading font-bold text-gray-800">Portfolio Admin</h1>
      <p class="text-xs text-gray-400 mt-1">Painel de controle</p>
    </div>
    <nav class="p-4 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
      </a>
      <a href="profile.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-primary/10 text-primary font-medium">
        <i data-lucide="user" class="w-4 h-4"></i> Perfil
      </a>
      <a href="projects.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="folder" class="w-4 h-4"></i> Projetos
      </a>
      <a href="skills.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="zap" class="w-4 h-4"></i> Skills
      </a>
      <a href="blog-posts.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="file-text" class="w-4 h-4"></i> Blog Posts
      </a>
      <a href="messages.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="mail" class="w-4 h-4"></i> Mensagens
      </a>
      <hr class="my-4 border-gray-100">
      <button onclick="adminLogout()" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-red-500 hover:bg-red-50 transition-colors w-full">
        <i data-lucide="log-out" class="w-4 h-4"></i> Sair
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="lg:ml-64 pt-16 lg:pt-0">
    <div class="p-6 lg:p-8 max-w-3xl">
      <!-- Header -->
      <div class="mb-8">
        <h2 class="text-2xl font-heading font-bold text-gray-800">Editar Perfil</h2>
        <p class="text-gray-500 mt-1">Informacoes exibidas no hero e sobre</p>
      </div>

      <!-- Loading state -->
      <div id="profile-loading" class="bg-white rounded-xl shadow-sm p-8">
        <div class="animate-pulse space-y-4">
          <div class="h-4 bg-gray-200 rounded w-1/3"></div>
          <div class="h-10 bg-gray-200 rounded"></div>
          <div class="h-4 bg-gray-200 rounded w-1/3"></div>
          <div class="h-10 bg-gray-200 rounded"></div>
          <div class="h-4 bg-gray-200 rounded w-1/3"></div>
          <div class="h-24 bg-gray-200 rounded"></div>
        </div>
      </div>

      <!-- Profile Form -->
      <form id="profile-form" class="hidden space-y-6">
        <!-- Photo Upload -->
        <div class="bg-white rounded-xl shadow-sm p-6">
          <h3 class="text-lg font-semibold text-gray-800 mb-4">Foto</h3>
          <div class="flex items-center gap-6">
            <div id="photo-preview" class="w-24 h-24 rounded-full bg-gray-100 flex items-center justify-center overflow-hidden">
              <i data-lucide="user" class="w-10 h-10 text-gray-300"></i>
            </div>
            <div>
              <input type="file" id="photo-file" accept="image/*" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-primary/10 file:text-primary file:font-medium hover:file:bg-primary/20 file:cursor-pointer">
              <p class="text-xs text-gray-400 mt-2">JPG, PNG ou WebP. Max 2MB.</p>
            </div>
          </div>
        </div>

        <!-- Basic Info -->
        <div class="bg-white rounded-xl shadow-sm p-6 space-y-4">
          <h3 class="text-lg font-semibold text-gray-800 mb-2">Informacoes basicas</h3>

          <div>
            <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Nome completo</label>
            <input type="text" id="full_name" required
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
          </div>

          <div>
            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Titulo</label>
            <input type="text" id="title" required placeholder="Ex: Desenvolvedora Front-End"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
          </div>

          <div>
            <label for="subtitle" class="block text-sm font-medium text-gray-700 mb-1">Subtitulo</label>
            <input type="text" id="subtitle" placeholder="Ex: Transformando ideias em experiencias digitais"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
          </div>

          <div>
            <label for="bio" class="block text-sm font-medium text-gray-700 mb-1">Bio curta</label>
            <textarea id="bio" rows="3" placeholder="Uma descricao breve para o hero..."
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors resize-none"></textarea>
          </div>

          <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Descricao completa</label>
            <textarea id="description" rows="5" placeholder="Texto da secao Sobre Mim..."
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors resize-none"></textarea>
          </div>

          <div>
            <label for="resume_url" class="block text-sm font-medium text-gray-700 mb-1">Link do curriculo</label>
            <input type="url" id="resume_url" placeholder="https://..."
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
          </div>
        </div>

        <!-- Social Links -->
        <div class="bg-white rounded-xl shadow-sm p-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-gray-800">Redes sociais</h3>
            <button type="button" id="add-social-btn" class="text-sm text-primary hover:text-primary-dark font-medium flex items-center gap-1">
              <i data-lucide="plus" class="w-4 h-4"></i> Adicionar
            </button>
          </div>
          <div id="social-links-container" class="space-y-3">
            <!-- Dynamic rows will be added here -->
          </div>
          <p id="no-socials-msg" class="text-sm text-gray-400 text-center py-4">Nenhuma rede social adicionada.</p>
        </div>

        <!-- Save Button -->
        <div class="flex justify-end">
          <button type="submit" id="save-btn" class="bg-primary hover:bg-primary-dark text-white font-medium px-8 py-2.5 rounded-lg transition-colors flex items-center gap-2">
            <i data-lucide="save" class="w-4 h-4"></i> Salvar alteracoes
          </button>
        </div>
      </form>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script src="../js/utils/render.js"></script>
  <script src="../js/utils/dates.js"></script>
  <script src="../js/utils/storage.js"></script>
  <script src="../js/api/profile.js"></script>
  <script src="../js/admin/profile-form.js"></script>
  <script>
    // Mobile sidebar toggle
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const menuToggle = document.getElementById('menu-toggle');

    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
    }
    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
    }

    menuToggle.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);

    // Init
    checkAuth().then(() => {
      loadProfile();
      lucide.createIcons();
    });
  </script>
</body>
</html>
