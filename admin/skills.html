<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Skills</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#6366f1', 'primary-dark': '#4f46e5' },
          fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <!-- Mobile Header -->
  <div class="lg:hidden fixed top-0 left-0 right-0 bg-white border-b border-gray-200 z-30 px-4 py-3 flex items-center justify-between">
    <h1 class="text-lg font-heading font-bold text-gray-800">Admin</h1>
    <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
      <i data-lucide="menu" class="w-5 h-5 text-gray-600"></i>
    </button>
  </div>

  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30 lg:hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-200">
    <div class="p-6 border-b border-gray-100">
      <h1 class="text-xl font-heading font-bold text-gray-800">Portfolio Admin</h1>
      <p class="text-xs text-gray-400 mt-1">Painel de controle</p>
    </div>
    <nav class="p-4 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
      </a>
      <a href="profile.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="user" class="w-4 h-4"></i> Perfil
      </a>
      <a href="projects.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="folder" class="w-4 h-4"></i> Projetos
      </a>
      <a href="skills.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-primary/10 text-primary font-medium">
        <i data-lucide="zap" class="w-4 h-4"></i> Skills
      </a>
      <a href="blog-posts.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="file-text" class="w-4 h-4"></i> Blog Posts
      </a>
      <a href="messages.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="mail" class="w-4 h-4"></i> Mensagens
      </a>
      <hr class="my-4 border-gray-100">
      <button onclick="adminLogout()" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-red-500 hover:bg-red-50 transition-colors w-full">
        <i data-lucide="log-out" class="w-4 h-4"></i> Sair
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="lg:ml-64 pt-16 lg:pt-0">
    <div class="p-6 lg:p-8">
      <!-- Header -->
      <div class="flex items-center justify-between mb-8">
        <div>
          <h2 class="text-2xl font-heading font-bold text-gray-800">Skills</h2>
          <p class="text-gray-500 mt-1">Gerencie suas habilidades e competencias</p>
        </div>
        <button onclick="openSkillModal()" class="bg-primary hover:bg-primary-dark text-white font-medium px-5 py-2.5 rounded-lg transition-colors flex items-center gap-2">
          <i data-lucide="plus" class="w-4 h-4"></i> Nova skill
        </button>
      </div>

      <!-- Skills Table -->
      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <div id="skills-loading" class="p-8">
          <div class="animate-pulse space-y-3">
            <div class="h-10 bg-gray-100 rounded"></div>
            <div class="h-10 bg-gray-100 rounded"></div>
            <div class="h-10 bg-gray-100 rounded"></div>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table id="skills-table" class="hidden w-full">
            <thead class="bg-gray-50 border-b border-gray-200">
              <tr>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Skill</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Categoria</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Proficiencia</th>
                <th class="text-center px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Visivel</th>
                <th class="text-center px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Ordem</th>
                <th class="text-right px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Acoes</th>
              </tr>
            </thead>
            <tbody id="skills-tbody" class="divide-y divide-gray-100">
            </tbody>
          </table>
        </div>
        <div id="skills-empty" class="hidden p-8 text-center text-gray-400">
          Nenhuma skill cadastrada ainda.
        </div>
      </div>
    </div>
  </main>

  <!-- Skill Modal -->
  <div id="skill-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg">
      <div class="flex items-center justify-between p-6 border-b border-gray-100">
        <h3 id="skill-modal-title" class="text-lg font-heading font-semibold text-gray-800">Nova Skill</h3>
        <button onclick="closeSkillModal()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
          <i data-lucide="x" class="w-5 h-5 text-gray-400"></i>
        </button>
      </div>
      <form id="skill-form" class="p-6 space-y-4">
        <input type="hidden" id="skill-id">

        <div>
          <label for="skill-name" class="block text-sm font-medium text-gray-700 mb-1">Nome *</label>
          <input type="text" id="skill-name" required placeholder="Ex: JavaScript"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
        </div>

        <div>
          <label for="skill-category" class="block text-sm font-medium text-gray-700 mb-1">Categoria *</label>
          <input type="text" id="skill-category" required placeholder="Ex: Frontend, Backend, Tools"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
        </div>

        <div>
          <label for="skill-icon" class="block text-sm font-medium text-gray-700 mb-1">Icone (nome Lucide)</label>
          <input type="text" id="skill-icon" placeholder="Ex: code, database, palette"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
        </div>

        <div>
          <label for="skill-proficiency" class="block text-sm font-medium text-gray-700 mb-1">
            Proficiencia: <span id="proficiency-value">50</span>%
          </label>
          <input type="range" id="skill-proficiency" min="0" max="100" value="50"
            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="skill-order" class="block text-sm font-medium text-gray-700 mb-1">Ordem</label>
            <input type="number" id="skill-order" value="0" min="0"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
          </div>
          <div class="flex items-center gap-2 pt-6">
            <input type="checkbox" id="skill-visible" checked class="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary">
            <label for="skill-visible" class="text-sm font-medium text-gray-700">Visivel</label>
          </div>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
          <button type="button" onclick="closeSkillModal()" class="px-5 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
            Cancelar
          </button>
          <button type="submit" id="skill-save-btn" class="bg-primary hover:bg-primary-dark text-white font-medium px-5 py-2.5 rounded-lg transition-colors">
            Salvar
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script src="../js/utils/render.js"></script>
  <script src="../js/utils/dates.js"></script>
  <script src="../js/api/skills.js"></script>
  <script src="../js/admin/skills-form.js"></script>
  <script>
    // Mobile sidebar toggle
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const menuToggle = document.getElementById('menu-toggle');

    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
    }
    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
    }

    menuToggle.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);

    // Init
    checkAuth().then(() => {
      loadSkills();
      lucide.createIcons();
    });
  </script>
</body>
</html>
