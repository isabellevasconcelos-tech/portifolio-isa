<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Mensagens</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#6366f1', 'primary-dark': '#4f46e5' },
          fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <!-- Mobile Header -->
  <div class="lg:hidden fixed top-0 left-0 right-0 bg-white border-b border-gray-200 z-30 px-4 py-3 flex items-center justify-between">
    <h1 class="text-lg font-heading font-bold text-gray-800">Admin</h1>
    <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
      <i data-lucide="menu" class="w-5 h-5 text-gray-600"></i>
    </button>
  </div>

  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30 lg:hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-200">
    <div class="p-6 border-b border-gray-100">
      <h1 class="text-xl font-heading font-bold text-gray-800">Portfolio Admin</h1>
      <p class="text-xs text-gray-400 mt-1">Painel de controle</p>
    </div>
    <nav class="p-4 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
      </a>
      <a href="profile.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="user" class="w-4 h-4"></i> Perfil
      </a>
      <a href="projects.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="folder" class="w-4 h-4"></i> Projetos
      </a>
      <a href="skills.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="zap" class="w-4 h-4"></i> Skills
      </a>
      <a href="blog-posts.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
        <i data-lucide="file-text" class="w-4 h-4"></i> Blog Posts
      </a>
      <a href="messages.html" class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-primary/10 text-primary font-medium">
        <i data-lucide="mail" class="w-4 h-4"></i> Mensagens
      </a>
      <hr class="my-4 border-gray-100">
      <button onclick="adminLogout()" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-red-500 hover:bg-red-50 transition-colors w-full">
        <i data-lucide="log-out" class="w-4 h-4"></i> Sair
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="lg:ml-64 pt-16 lg:pt-0">
    <div class="p-6 lg:p-8">
      <!-- Header -->
      <div class="mb-8">
        <h2 class="text-2xl font-heading font-bold text-gray-800">Mensagens</h2>
        <p class="text-gray-500 mt-1">Mensagens recebidas pelo formulario de contato</p>
      </div>

      <!-- Messages List -->
      <div id="messages-loading" class="bg-white rounded-xl shadow-sm p-8">
        <div class="animate-pulse space-y-3">
          <div class="h-16 bg-gray-100 rounded"></div>
          <div class="h-16 bg-gray-100 rounded"></div>
          <div class="h-16 bg-gray-100 rounded"></div>
        </div>
      </div>

      <div id="messages-list" class="hidden space-y-3">
        <!-- Messages will be rendered here -->
      </div>

      <div id="messages-empty" class="hidden bg-white rounded-xl shadow-sm p-8 text-center text-gray-400">
        <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 text-gray-200"></i>
        <p>Nenhuma mensagem recebida ainda.</p>
      </div>
    </div>
  </main>

  <!-- Message Detail Modal -->
  <div id="message-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg">
      <div class="flex items-center justify-between p-6 border-b border-gray-100">
        <h3 id="message-modal-title" class="text-lg font-heading font-semibold text-gray-800">Mensagem</h3>
        <button onclick="closeMessageModal()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
          <i data-lucide="x" class="w-5 h-5 text-gray-400"></i>
        </button>
      </div>
      <div class="p-6">
        <div class="space-y-4">
          <div>
            <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">De</p>
            <p id="message-sender" class="font-medium text-gray-800"></p>
            <p id="message-email" class="text-sm text-primary"></p>
          </div>
          <div>
            <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Assunto</p>
            <p id="message-subject" class="text-gray-800"></p>
          </div>
          <div>
            <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Mensagem</p>
            <p id="message-body" class="text-gray-600 whitespace-pre-wrap"></p>
          </div>
          <div>
            <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Recebida em</p>
            <p id="message-date" class="text-sm text-gray-500"></p>
          </div>
        </div>
        <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-100">
          <a id="message-reply-link" href="#" class="text-sm text-primary hover:text-primary-dark font-medium flex items-center gap-1">
            <i data-lucide="reply" class="w-4 h-4"></i> Responder por email
          </a>
          <button id="message-delete-btn" class="text-sm text-red-500 hover:text-red-700 font-medium flex items-center gap-1">
            <i data-lucide="trash-2" class="w-4 h-4"></i> Excluir
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script src="../js/utils/render.js"></script>
  <script src="../js/utils/dates.js"></script>
  <script src="../js/api/messages.js"></script>
  <script src="../js/admin/messages-view.js"></script>
  <script>
    // Mobile sidebar toggle
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const menuToggle = document.getElementById('menu-toggle');

    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
    }
    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
    }

    menuToggle.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);

    // Init
    checkAuth().then(() => {
      loadMessages();
      lucide.createIcons();
    });
  </script>
</body>
</html>
