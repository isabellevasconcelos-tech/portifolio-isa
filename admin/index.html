<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#6366f1', 'primary-dark': '#4f46e5' },
          fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
    <h1 class="text-2xl font-heading font-bold text-center mb-6 text-gray-800">Admin Login</h1>

    <div id="login-error" class="hidden bg-red-50 text-red-600 text-sm px-4 py-2 rounded-lg mb-4"></div>

    <form id="login-form" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="email" required
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input type="password" id="password" required
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-primary transition-colors">
      </div>
      <button type="submit" id="login-btn"
        class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-2.5 rounded-lg transition-colors">
        Entrar
      </button>
    </form>

    <p class="text-center mt-4">
      <a href="../index.html" class="text-sm text-gray-400 hover:text-primary transition-colors">Voltar ao site</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin/auth.js"></script>
  <script>
    // Redirect if already logged in
    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorDiv = document.getElementById('login-error');

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      errorDiv.classList.add('hidden');

      try {
        await adminLogin(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorDiv.textContent = 'Email ou senha incorretos.';
        errorDiv.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
