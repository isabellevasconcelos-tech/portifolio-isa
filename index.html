<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Isabela</title>
  <meta name="description" content="Portfolio profissional de Isabela - Desenvolvedora Full Stack">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            'primary-dark': '#4f46e5',
            secondary: '#ec4899',
            accent: '#8b5cf6',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/custom.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Navigation -->
  <nav class="fixed top-0 w-full bg-white/80 nav-blur shadow-sm z-40">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <a href="#hero" class="text-xl font-heading font-bold gradient-text">Isa</a>

        <!-- Mobile menu button -->
        <button id="mobile-menu-btn" class="sm:hidden p-2 rounded-lg hover:bg-gray-100">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>

        <!-- Desktop nav -->
        <div class="hidden sm:flex items-center gap-6">
          <a href="#about" class="text-sm text-gray-600 hover:text-primary transition-colors">Sobre</a>
          <a href="#projects" class="text-sm text-gray-600 hover:text-primary transition-colors">Projetos</a>
          <a href="#skills" class="text-sm text-gray-600 hover:text-primary transition-colors">Habilidades</a>
          <a href="#contact" class="text-sm text-gray-600 hover:text-primary transition-colors">Contato</a>
          <a href="blog.html" class="text-sm text-gray-600 hover:text-primary transition-colors">Blog</a>
        </div>
      </div>

      <!-- Mobile nav -->
      <div id="mobile-menu" class="sm:hidden hidden pb-4">
        <div class="flex flex-col gap-3">
          <a href="#about" class="text-sm text-gray-600 hover:text-primary transition-colors py-1">Sobre</a>
          <a href="#projects" class="text-sm text-gray-600 hover:text-primary transition-colors py-1">Projetos</a>
          <a href="#skills" class="text-sm text-gray-600 hover:text-primary transition-colors py-1">Habilidades</a>
          <a href="#contact" class="text-sm text-gray-600 hover:text-primary transition-colors py-1">Contato</a>
          <a href="blog.html" class="text-sm text-gray-600 hover:text-primary transition-colors py-1">Blog</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section id="hero" class="min-h-screen flex items-center hero-pattern pt-16">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 w-full">
      <div id="hero-content" class="flex flex-col md:flex-row items-center gap-8 md:gap-12">
        <!-- Content loaded by JS -->
      </div>
    </div>
  </section>

  <!-- About Section -->
  <section id="about" class="py-20 bg-white">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <h2 class="text-3xl font-heading font-bold text-center mb-12 fade-in">
        Sobre <span class="gradient-text">Mim</span>
      </h2>
      <div id="about-content" class="fade-in">
        <!-- Content loaded by JS -->
      </div>
    </div>
  </section>

  <!-- Projects Section -->
  <section id="projects" class="py-20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <h2 class="text-3xl font-heading font-bold text-center mb-12 fade-in">
        Meus <span class="gradient-text">Projetos</span>
      </h2>
      <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Content loaded by JS -->
      </div>
    </div>
  </section>

  <!-- Skills Section -->
  <section id="skills" class="py-20 bg-white">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <h2 class="text-3xl font-heading font-bold text-center mb-12 fade-in">
        <span class="gradient-text">Habilidades</span>
      </h2>
      <div id="skills-content" class="fade-in">
        <!-- Content loaded by JS -->
      </div>
    </div>
  </section>

  <!-- Contact Section -->
  <section id="contact" class="py-20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <h2 class="text-3xl font-heading font-bold text-center mb-12 fade-in">
        Entre em <span class="gradient-text">Contato</span>
      </h2>
      <div class="max-w-xl mx-auto fade-in">
        <form id="contact-form" class="space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label for="sender_name" class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
              <input type="text" id="sender_name" name="sender_name" required
                class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:border-primary transition-colors">
            </div>
            <div>
              <label for="sender_email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input type="email" id="sender_email" name="sender_email" required
                class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:border-primary transition-colors">
            </div>
          </div>
          <div>
            <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Assunto</label>
            <input type="text" id="subject" name="subject"
              class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:border-primary transition-colors">
          </div>
          <div>
            <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Mensagem</label>
            <textarea id="message" name="message" rows="5" required
              class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:border-primary transition-colors resize-none"></textarea>
          </div>
          <button type="submit" id="contact-submit"
            class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
            <i data-lucide="send" class="w-4 h-4"></i>
            Enviar Mensagem
          </button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-8">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center">
      <p class="text-sm" id="footer-text">&copy; 2026 Isabela. Todos os direitos reservados.</p>
      <div id="footer-social" class="flex justify-center gap-4 mt-4">
        <!-- Social links loaded by JS -->
      </div>
    </div>
  </footer>

  <!-- Back to Top -->
  <button id="back-to-top" class="back-to-top fixed bottom-6 right-6 bg-primary text-white p-3 rounded-full shadow-lg hover:bg-primary-dark transition-colors">
    <i data-lucide="arrow-up" class="w-5 h-5"></i>
  </button>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils/render.js"></script>
  <script src="js/utils/dates.js"></script>
  <script src="js/api/profile.js"></script>
  <script src="js/api/projects.js"></script>
  <script src="js/api/skills.js"></script>
  <script src="js/api/messages.js"></script>
  <script src="js/pages/home.js"></script>
</body>
</html>
