<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isa Lopes - Designer de Interfaces</title>
  <meta name="description" content="Portfolio de Isa Lopes - Designer de interfaces & experiencias digitais">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#1A0F2E',
            night: '#0D1B2A',
            gold: '#D4AF37',
            'gold-light': '#E8C84A',
            'gold-dark': '#B8960F',
            soft: '#F5F5F5',
            'soft-dim': '#E0DCD5',
          },
          fontFamily: {
            heading: ['Cinzel', 'serif'],
            body: ['Montserrat', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/custom.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="bg-dark text-soft font-body">

  <!-- Stars Canvas -->
  <canvas id="stars-canvas" class="fixed inset-0 pointer-events-none z-0"></canvas>

  <!-- Navigation -->
  <nav class="fixed top-0 w-full bg-dark/90 nav-blur border-b border-gold/20 z-40">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <a href="#hero" class="text-xl font-heading font-bold text-gold">Isa Lopes</a>

        <!-- Mobile menu button -->
        <button id="mobile-menu-btn" class="sm:hidden p-2 rounded-lg hover:bg-gold/10 text-gold">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>

        <!-- Desktop nav -->
        <div class="hidden sm:flex items-center gap-6">
          <a href="#about" class="text-sm text-soft/70 hover:text-gold transition-colors font-medium">Sobre</a>
          <a href="#projects" class="text-sm text-soft/70 hover:text-gold transition-colors font-medium">Projetos</a>
          <a href="#skills" class="text-sm text-soft/70 hover:text-gold transition-colors font-medium">Habilidades</a>
          <a href="#contact" class="text-sm text-soft/70 hover:text-gold transition-colors font-medium">Contato</a>
          <a href="blog.html" class="text-sm text-soft/70 hover:text-gold transition-colors font-medium">Blog</a>
        </div>
      </div>

      <!-- Mobile nav -->
      <div id="mobile-menu" class="sm:hidden hidden pb-4">
        <div class="flex flex-col gap-3">
          <a href="#about" class="text-sm text-soft/70 hover:text-gold transition-colors py-1">Sobre</a>
          <a href="#projects" class="text-sm text-soft/70 hover:text-gold transition-colors py-1">Projetos</a>
          <a href="#skills" class="text-sm text-soft/70 hover:text-gold transition-colors py-1">Habilidades</a>
          <a href="#contact" class="text-sm text-soft/70 hover:text-gold transition-colors py-1">Contato</a>
          <a href="blog.html" class="text-sm text-soft/70 hover:text-gold transition-colors py-1">Blog</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section id="hero" class="min-h-screen flex items-center relative pt-16 parchment-bg">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 w-full relative z-10">
      <div id="hero-content" class="flex flex-col md:flex-row items-center gap-8 md:gap-12">
        <!-- Content loaded by JS -->
      </div>
    </div>
    <!-- Gold divider -->
    <div class="absolute bottom-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-gold/50 to-transparent"></div>
  </section>

  <!-- About Section -->
  <section id="about" class="py-20 bg-night relative">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <h2 class="text-3xl font-heading font-bold text-center mb-12 fade-in">
        Sobre <span class="text-gold">Mim</span>
      </h2>
      <div id="about-content" class="fade-in">
        <!-- Content loaded by JS -->
      </div>
    </div>
    <div class="absolute bottom-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-gold/50 to-transparent"></div>
  </section>

  <!-- Projects Section -->
  <section id="projects" class="py-20 bg-dark relative">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <h2 class="text-3xl font-heading font-bold text-center mb-12 fade-in">
        Meus <span class="text-gold">Projetos</span>
      </h2>
      <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Content loaded by JS -->
      </div>
    </div>
    <div class="absolute bottom-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-gold/50 to-transparent"></div>
  </section>

  <!-- Skills Section -->
  <section id="skills" class="py-20 bg-night relative">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <h2 class="text-3xl font-heading font-bold text-center mb-12 fade-in">
        <span class="text-gold">Habilidades</span>
      </h2>
      <div id="skills-content" class="fade-in">
        <!-- Content loaded by JS -->
      </div>
    </div>
    <div class="absolute bottom-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-gold/50 to-transparent"></div>
  </section>

  <!-- Contact Section -->
  <section id="contact" class="py-20 bg-dark relative">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <h2 class="text-3xl font-heading font-bold text-center mb-12 fade-in">
        Entre em <span class="text-gold">Contato</span>
      </h2>
      <div class="max-w-xl mx-auto fade-in">
        <form id="contact-form" class="space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label for="sender_name" class="block text-sm font-medium text-soft/70 mb-1">Nome</label>
              <input type="text" id="sender_name" name="sender_name" required
                class="form-input w-full px-4 py-2.5 bg-night border border-gold/30 rounded-lg text-soft focus:border-gold transition-colors placeholder-soft/30"
                placeholder="Seu nome">
            </div>
            <div>
              <label for="sender_email" class="block text-sm font-medium text-soft/70 mb-1">Email</label>
              <input type="email" id="sender_email" name="sender_email" required
                class="form-input w-full px-4 py-2.5 bg-night border border-gold/30 rounded-lg text-soft focus:border-gold transition-colors placeholder-soft/30"
                placeholder="seu@email.com">
            </div>
          </div>
          <div>
            <label for="subject" class="block text-sm font-medium text-soft/70 mb-1">Assunto</label>
            <input type="text" id="subject" name="subject"
              class="form-input w-full px-4 py-2.5 bg-night border border-gold/30 rounded-lg text-soft focus:border-gold transition-colors placeholder-soft/30"
              placeholder="Assunto da mensagem">
          </div>
          <div>
            <label for="message" class="block text-sm font-medium text-soft/70 mb-1">Mensagem</label>
            <textarea id="message" name="message" rows="5" required
              class="form-input w-full px-4 py-2.5 bg-night border border-gold/30 rounded-lg text-soft focus:border-gold transition-colors resize-none placeholder-soft/30"
              placeholder="Escreva sua mensagem..."></textarea>
          </div>
          <button type="submit" id="contact-submit"
            class="w-full bg-gold hover:bg-gold-light text-dark font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
            <i data-lucide="send" class="w-4 h-4"></i>
            Enviar Mensagem
          </button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-night border-t border-gold/20 text-soft/50 py-8">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center">
      <p class="text-sm font-heading" id="footer-text">&copy; 2026 Isa Lopes. Todos os direitos reservados.</p>
      <div id="footer-social" class="flex justify-center gap-4 mt-4">
        <!-- Social links loaded by JS -->
      </div>
    </div>
  </footer>

  <!-- Back to Top -->
  <button id="back-to-top" class="back-to-top fixed bottom-6 right-6 bg-gold text-dark p-3 rounded-full shadow-lg hover:bg-gold-light transition-colors z-30">
    <i data-lucide="arrow-up" class="w-5 h-5"></i>
  </button>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils/render.js"></script>
  <script src="js/utils/dates.js"></script>
  <script src="js/api/profile.js"></script>
  <script src="js/api/projects.js"></script>
  <script src="js/api/skills.js"></script>
  <script src="js/api/messages.js"></script>
  <script src="js/pages/home.js"></script>
</body>
</html>
