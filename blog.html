<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Isa Lopes</title>
  <meta name="description" content="Blog de Isa Lopes - Artigos sobre design e tecnologia">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dark: '#1A0F2E', night: '#0D1B2A', gold: '#D4AF37', 'gold-light': '#E8C84A', soft: '#F5F5F5' },
          fontFamily: { heading: ['Cinzel', 'serif'], body: ['Montserrat', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/custom.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="bg-dark text-soft font-body">

  <!-- Navigation -->
  <nav class="bg-dark/90 nav-blur border-b border-gold/20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="text-xl font-heading font-bold text-gold">Isa Lopes</a>
        <div class="flex items-center gap-6">
          <a href="index.html" class="text-sm text-soft/70 hover:text-gold transition-colors font-medium">Portfolio</a>
          <a href="blog.html" class="text-sm text-gold font-medium">Blog</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Blog Header -->
  <header class="bg-night border-b border-gold/20 py-12">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center">
      <h1 class="text-4xl font-heading font-bold mb-3 text-gold gold-glow">Blog</h1>
      <p class="text-soft/50">Artigos, tutoriais e reflexoes sobre design e tecnologia</p>
    </div>
  </header>

  <!-- Blog Posts Grid -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-12">
    <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    </div>

    <div id="load-more-container" class="text-center mt-8 hidden">
      <button id="load-more-btn"
        class="border border-gold/30 text-gold hover:bg-gold hover:text-dark px-6 py-2.5 rounded-lg font-medium transition-colors">
        Carregar mais
      </button>
    </div>

    <div id="blog-empty" class="hidden text-center py-20 text-soft/30">
      <i data-lucide="pen-line" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>
      <p class="font-heading">Nenhum post publicado ainda. Volte em breve!</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-night border-t border-gold/20 text-soft/50 py-8">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center">
      <p class="text-sm font-heading">&copy; 2026 Isa Lopes. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils/render.js"></script>
  <script src="js/utils/dates.js"></script>
  <script src="js/api/blog.js"></script>
  <script src="js/pages/blog-list.js"></script>
</body>
</html>
