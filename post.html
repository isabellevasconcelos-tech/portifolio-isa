<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post - Isabela</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#6366f1', 'primary-dark': '#4f46e5', secondary: '#ec4899', accent: '#8b5cf6' },
          fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    /* Blog post content styles */
    .prose h1 { font-size: 2rem; font-weight: 700; margin: 1.5rem 0 1rem; }
    .prose h2 { font-size: 1.5rem; font-weight: 600; margin: 1.5rem 0 0.75rem; }
    .prose h3 { font-size: 1.25rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
    .prose p { margin: 0.75rem 0; line-height: 1.75; }
    .prose ul, .prose ol { margin: 0.75rem 0; padding-left: 1.5rem; }
    .prose ul { list-style-type: disc; }
    .prose ol { list-style-type: decimal; }
    .prose li { margin: 0.25rem 0; }
    .prose code { background: #f1f5f9; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; }
    .prose pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; }
    .prose pre code { background: none; padding: 0; color: inherit; }
    .prose blockquote { border-left: 3px solid #6366f1; padding-left: 1rem; color: #64748b; font-style: italic; margin: 1rem 0; }
    .prose a { color: #6366f1; text-decoration: underline; }
    .prose img { border-radius: 0.5rem; margin: 1rem 0; max-width: 100%; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Navigation -->
  <nav class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="text-xl font-heading font-bold gradient-text">Isa</a>
        <div class="flex items-center gap-6">
          <a href="index.html" class="text-sm text-gray-600 hover:text-primary transition-colors">Portfolio</a>
          <a href="blog.html" class="text-sm text-gray-600 hover:text-primary transition-colors">Blog</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Post Content -->
  <main class="max-w-3xl mx-auto px-4 sm:px-6 py-12">
    <div id="post-loading" class="text-center py-20">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary mx-auto"></div>
    </div>

    <article id="post-content" class="hidden">
      <a href="blog.html" class="text-sm text-primary hover:text-primary-dark flex items-center gap-1 mb-6 transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar ao blog
      </a>

      <div id="post-cover" class="mb-6"></div>

      <div class="flex flex-wrap gap-1.5 mb-3" id="post-tags"></div>
      <h1 id="post-title" class="text-3xl md:text-4xl font-heading font-bold text-gray-900 mb-3"></h1>
      <p id="post-date" class="text-sm text-gray-400 mb-8"></p>

      <div id="post-body" class="prose text-gray-600"></div>
    </article>

    <div id="post-not-found" class="hidden text-center py-20 text-gray-400">
      <i data-lucide="file-x" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>
      <p class="mb-4">Post nao encontrado.</p>
      <a href="blog.html" class="text-primary hover:text-primary-dark transition-colors">Voltar ao blog</a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-8">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center">
      <p class="text-sm">&copy; 2026 Isabela. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils/render.js"></script>
  <script src="js/utils/dates.js"></script>
  <script src="js/api/blog.js"></script>
  <script src="js/pages/blog-post.js"></script>
</body>
</html>
