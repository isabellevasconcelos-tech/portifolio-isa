<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post - Isabelle Lopes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dark: '#1A0F2E', night: '#0D1B2A', gold: '#D4AF37', 'gold-light': '#E8C84A', soft: '#F5F5F5' },
          fontFamily: { heading: ['Cinzel', 'serif'], body: ['Montserrat', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    .prose h1 { font-size: 2rem; font-weight: 700; margin: 1.5rem 0 1rem; color: #F5F5F5; font-family: 'Cinzel', serif; }
    .prose h2 { font-size: 1.5rem; font-weight: 600; margin: 1.5rem 0 0.75rem; color: #D4AF37; font-family: 'Cinzel', serif; }
    .prose h3 { font-size: 1.25rem; font-weight: 600; margin: 1.25rem 0 0.5rem; color: #F5F5F5; }
    .prose p { margin: 0.75rem 0; line-height: 1.75; color: rgba(245,245,245,0.7); }
    .prose ul, .prose ol { margin: 0.75rem 0; padding-left: 1.5rem; color: rgba(245,245,245,0.7); }
    .prose ul { list-style-type: disc; }
    .prose ol { list-style-type: decimal; }
    .prose li { margin: 0.25rem 0; }
    .prose code { background: #0D1B2A; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; color: #D4AF37; }
    .prose pre { background: #0D1B2A; color: #F5F5F5; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; border: 1px solid rgba(212,175,55,0.15); }
    .prose pre code { background: none; padding: 0; color: inherit; }
    .prose blockquote { border-left: 3px solid #D4AF37; padding-left: 1rem; color: rgba(245,245,245,0.5); font-style: italic; margin: 1rem 0; }
    .prose a { color: #D4AF37; text-decoration: underline; }
    .prose img { border-radius: 0.5rem; margin: 1rem 0; max-width: 100%; }
  </style>
</head>
<body class="bg-dark text-soft font-body">

  <!-- Navigation -->
  <nav class="bg-dark/90 nav-blur border-b border-gold/20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="text-xl font-heading font-bold text-gold">Isabelle Lopes</a>
        <div class="flex items-center gap-6">
          <a href="index.html" class="text-sm text-soft/70 hover:text-gold transition-colors font-medium">Portfolio</a>
          <a href="blog.html" class="text-sm text-soft/70 hover:text-gold transition-colors font-medium">Blog</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Post Content -->
  <main class="max-w-3xl mx-auto px-4 sm:px-6 py-12">
    <div id="post-loading" class="text-center py-20">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-gold mx-auto"></div>
    </div>

    <article id="post-content" class="hidden">
      <a href="blog.html" class="text-sm text-gold hover:text-gold-light flex items-center gap-1 mb-6 transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar ao blog
      </a>

      <div id="post-cover" class="mb-6"></div>
      <div class="flex flex-wrap gap-1.5 mb-3" id="post-tags"></div>
      <h1 id="post-title" class="text-3xl md:text-4xl font-heading font-bold text-soft mb-3 gold-glow"></h1>
      <p id="post-date" class="text-sm text-gold/50 mb-8"></p>
      <div class="w-full h-px bg-gradient-to-r from-transparent via-gold/30 to-transparent mb-8"></div>
      <div id="post-body" class="prose"></div>
    </article>

    <div id="post-not-found" class="hidden text-center py-20 text-soft/30">
      <i data-lucide="file-x" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>
      <p class="mb-4 font-heading">Post nao encontrado.</p>
      <a href="blog.html" class="text-gold hover:text-gold-light transition-colors">Voltar ao blog</a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-night border-t border-gold/20 text-soft/50 py-8">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center">
      <p class="text-sm font-heading">&copy; 2026 Isabelle Lopes. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils/render.js"></script>
  <script src="js/utils/dates.js"></script>
  <script src="js/api/blog.js"></script>
  <script src="js/pages/blog-post.js"></script>
</body>
</html>
